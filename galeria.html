<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Galeria de fotos do Projeto Soul Surf — momentos, treinos e ações sociais em Itanhaém." />
  <meta name="theme-color" content="#0073A8" />
  <title>Galeria de Fotos — Projeto Soul Surf</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Glegoo:wght@400;700&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/shared.css" />

  <style>
    body { padding-top: 72px; }
    .page-hero {
      padding: 72px 0 60px;
      min-height: 280px;
      background:
        linear-gradient(135deg, rgba(0,115,168,.82) 0%, rgba(0,52,90,.88) 100%),
        url('./images/projeto-soul-surf-foto-24.jpeg') center/cover no-repeat;
      color: #fff;
      text-align: center;
      display: flex;
      align-items: center;
    }
    .page-hero h1 { font-size: clamp(38px, 6vw, 62px); margin-bottom: 18px; }
    .page-hero p { font-size: 17px; max-width: 760px; margin: 0 auto; line-height: 1.8; opacity: .95; }

    .content-section { padding: 80px 0 120px; }
    .section-header { text-align: center; max-width: 760px; margin: 0 auto 48px; }
    .section-header h2 { font-size: clamp(32px, 4.4vw, 48px); margin-bottom: 18px; }
    .section-header p { font-size: 16px; color: var(--text-light); line-height: 1.8; }

    .gallery-grid {
      display: grid;
      gap: 14px;
    }
    .gallery-item {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      min-height: 220px;
      background: #000;
      box-shadow: 0 8px 26px rgba(0,0,0,.08);
      cursor: pointer;
      transition: transform .3s ease;
    }
    .gallery-item.featured {
      min-height: 520px;
    }
    .gallery-thumbnails {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      cursor: zoom-in;
      transition: transform .45s ease;
    }
    .gallery-item:hover img { transform: scale(1.08); }
    .gallery-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 45%, rgba(5,18,35,.65) 100%);
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease;
    }
    .gallery-item:hover::after { opacity: 1; }
    .gallery-item span {
      position: absolute;
      left: 14px;
      bottom: 12px;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      z-index: 2;
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: all .3s ease;
    }
    .gallery-item:hover span { opacity: 1; transform: translateY(0); }

    .lightbox {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(5,18,35,.88);
      z-index: 1200;
    }
    .lightbox.show { display: flex; }
    .lightbox img {
      max-width: min(1200px, 94vw);
      max-height: 88vh;
      width: auto;
      height: auto;
      border-radius: 14px;
      box-shadow: 0 24px 72px rgba(0,0,0,.45);
      object-fit: contain;
    }
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      border: 1px solid rgba(255,255,255,.35);
      border-radius: 50%;
      background: rgba(0,0,0,.28);
      color: #fff;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lightbox-nav:hover { background: rgba(0,0,0,.5); }
    .lightbox-nav.prev { left: 18px; }
    .lightbox-nav.next { right: 18px; }
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255,255,255,.35);
      border-radius: 50%;
      background: rgba(0,0,0,.28);
      color: #fff;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lightbox-close:hover { background: rgba(0,0,0,.5); }
    .lightbox-counter {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,.88);
      font-size: 13px;
      letter-spacing: .08em;
      background: rgba(0,0,0,.32);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 999px;
      padding: 6px 12px;
    }

    @media (max-width: 980px) {
      .lightbox-nav { display: none; }
    }
    @media (max-width: 640px) {
      body { padding-top: 64px; }
      .page-hero { padding: 60px 0; }
      .gallery-grid { grid-template-columns: 1fr; }
      .gallery-item { min-height: 220px; }
      .lightbox img { max-height: 80vh; }
    }
  </style>
</head>
<body>

      <div class="container">
        <h1>Galeria de Fotos</h1>
        <p>Veja os momentos mais especiais do Soul Surf: treinos, atividades sociais, eventos e as conquistas da nossa comunidade.</p>

    </section>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox" aria-hidden="true" role="dialog" aria-label="Visualização ampliada da galeria">
      <div class="lightbox-content">
        <button class="lightbox-close" id="lightboxClose" aria-label="Fechar imagem">&times;</button>
        <button class="lightbox-nav prev" id="lightboxPrev" aria-label="Imagem anterior">&#10094;</button>
        <img id="lightboxImg" class="lightbox-img" src="" alt="" />
        <button class="lightbox-nav next" id="lightboxNext" aria-label="Próxima imagem">&#10095;</button>
        <div class="lightbox-counter" id="lightboxCounter" aria-live="polite"></div>
      </div>
    </div>
  </main>

  <script>
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxClose = document.getElementById('lightboxClose');
    const lightboxPrev = document.getElementById('lightboxPrev');
    const lightboxNext = document.getElementById('lightboxNext');
    const lightboxCounter = document.getElementById('lightboxCounter');
    const galleryCards = Array.from(document.querySelectorAll('.gallery-item'));
    const galleryImages = galleryCards.map(card => card.querySelector('img')).filter(Boolean);
    let currentImageIndex = 0;
    let touchStartX = 0;

    function updateLightbox(index) {
      if (!galleryImages.length) return;
      currentImageIndex = (index + galleryImages.length) % galleryImages.length;
      const currentImage = galleryImages[currentImageIndex];

      lightboxImg.src = currentImage.src;
      lightboxImg.alt = currentImage.alt || 'Imagem da galeria Soul Surf';
      lightboxCounter.textContent = `${currentImageIndex + 1} / ${galleryImages.length}`;
    }

    function openLightbox(index) {
      updateLightbox(index);
      lightbox.classList.add('show');
      lightbox.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('show');
      lightbox.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      lightboxImg.src = '';
      lightboxImg.alt = '';
    }

    function showPrevImage() {
      updateLightbox(currentImageIndex - 1);
    }

    function showNextImage() {
      updateLightbox(currentImageIndex + 1);
    }

    galleryCards.forEach((card, index) => {
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.addEventListener('click', () => openLightbox(index));
      card.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          openLightbox(index);
        }
      });
    });

    lightboxClose.addEventListener('click', closeLightbox);
    lightboxPrev.addEventListener('click', showPrevImage);
    lightboxNext.addEventListener('click', showNextImage);

    lightbox.addEventListener('click', (event) => {
      if (event.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', (event) => {
      if (!lightbox.classList.contains('show')) return;
      if (event.key === 'Escape') closeLightbox();
      if (event.key === 'ArrowLeft') showPrevImage();
      if (event.key === 'ArrowRight') showNextImage();
    });

    lightbox.addEventListener('touchstart', (event) => {
      touchStartX = event.changedTouches[0].clientX;
    }, { passive: true });

    lightbox.addEventListener('touchend', (event) => {
      const deltaX = event.changedTouches[0].clientX - touchStartX;
      if (Math.abs(deltaX) < 40) return;
      if (deltaX > 0) showPrevImage();
      if (deltaX < 0) showNextImage();
    }, { passive: true });
  </script>

  <script type="module" src="js/shared.js"></script>
</body>
</html>
