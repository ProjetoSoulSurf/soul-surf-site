<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Glegoo:wght@400;700&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/shared.css" />

  <style>
    body { padding-top: 72px; }
    .page-hero {
      padding: 72px 0 60px;
      min-height: 280px;
      background:
        linear-gradient(135deg, rgba(0,115,168,.82) 0%, rgba(0,52,90,.88) 100%),
        url('/images/gallery/projeto-soul-surf-foto-28.jpg') center/cover no-repeat;
      color: #fff;
      text-align: center;
      display: flex;
      align-items: center;
    }
    .page-hero h1 { font-size: clamp(38px, 6vw, 62px); margin-bottom: 18px; }
    .page-hero p { font-size: 17px; max-width: 760px; margin: 0 auto; line-height: 1.8; opacity: .95; }

    .content-section { padding: 80px 0 120px; }
    .section-header { text-align: center; max-width: 760px; margin: 0 auto 48px; }
    .section-header h2 { font-size: clamp(32px, 4.4vw, 48px); margin-bottom: 18px; }
    .section-header p { font-size: 16px; color: var(--text-light); line-height: 1.8; }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }
    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      min-height: 260px;
      background: #000;
      box-shadow: 0 12px 40px rgba(0,0,0,.08);
      cursor: pointer;
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
      transition: transform .35s ease;
    }
    .gallery-item:hover img { transform: scale(1.05); }


    /* Lightbox Styles */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,.9);
      display: none;
      z-index: 10000;
      opacity: 0;
      transition: opacity .3s ease;
    }
    .lightbox.show {
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
    }
    .lightbox-content {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lightbox-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    .lightbox-close {
      position: absolute;
      top: -50px;
      right: 0;
      color: #fff;
      font-size: 32px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 8px;
      transition: color .2s ease;
    }
    .lightbox-close:hover { color: var(--blue); }
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: #fff;
      font-size: 48px;
      cursor: pointer;
      background: rgba(0,0,0,.3);
      border: none;
      padding: 16px;
      border-radius: 50%;
      transition: all .2s ease;
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lightbox-nav:hover { background: rgba(0,115,168,.8); }
    .lightbox-prev { left: -80px; }
    .lightbox-next { right: -80px; }
    .lightbox-counter {
      position: absolute;
      bottom: -40px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 14px;
      background: rgba(0,0,0,.6);
      padding: 8px 16px;
      border-radius: 20px;
    }

    @media (max-width: 980px) {
      .gallery-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .lightbox-nav { display: none; }
    }
    @media (max-width: 640px) {
      body { padding-top: 64px; }
      .page-hero { padding: 60px 0; }
      .gallery-grid { grid-template-columns: 1fr; }
      .gallery-item { min-height: 220px; }
      .lightbox-content { max-width: 95vw; max-height: 95vh; }
    }
  </style>
</head>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
      <div class="lightbox-content">
        <button class="lightbox-close" id="lightboxClose">&times;</button>
        <button class="lightbox-nav lightbox-prev" id="lightboxPrev">&#10094;</button>
        <img id="lightboxImg" class="lightbox-img" src="" alt="" />
        <button class="lightbox-nav lightbox-next" id="lightboxNext">&#10095;</button>
        <div class="lightbox-counter" id="lightboxCounter"></div>
      </div>

  <script>
    // Lightbox functionality
    let currentImageIndex = 0;
    let galleryImages = [];

    // Initialize gallery
    function initGallery() {
      const galleryItems = document.querySelectorAll('.gallery-item');
      galleryImages = Array.from(galleryItems).map(item => ({
        src: item.querySelector('img').src,
        alt: item.querySelector('img').alt,
        caption: item.querySelector('.gallery-caption')?.textContent || ''
      }));

      // Add click event to each gallery item
      galleryItems.forEach((item, index) => {
        item.addEventListener('click', () => openLightbox(index));
      });
    }

    // Open lightbox
    function openLightbox(index) {
      currentImageIndex = index;
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const counter = document.getElementById('lightboxCounter');

      lightboxImg.src = galleryImages[index].src;
      lightboxImg.alt = galleryImages[index].alt;
      counter.textContent = `${index + 1} / ${galleryImages.length}`;

      lightbox.classList.add('show');
      document.body.style.overflow = 'hidden';

      // Add keyboard navigation
      document.addEventListener('keydown', handleKeyPress);
    }

    // Close lightbox
    function closeLightbox() {
      const lightbox = document.getElementById('lightbox');
      lightbox.classList.remove('show');
      document.body.style.overflow = '';
      document.removeEventListener('keydown', handleKeyPress);
    }

    // Navigate to next image
    function nextImage() {
      currentImageIndex = (currentImageIndex + 1) % galleryImages.length;
      updateLightboxImage();
    }

    // Navigate to previous image
    function prevImage() {
      currentImageIndex = (currentImageIndex - 1 + galleryImages.length) % galleryImages.length;
      updateLightboxImage();
    }

    // Update lightbox image
    function updateLightboxImage() {
      const lightboxImg = document.getElementById('lightboxImg');
      const counter = document.getElementById('lightboxCounter');

      lightboxImg.src = galleryImages[currentImageIndex].src;
      lightboxImg.alt = galleryImages[currentImageIndex].alt;
      counter.textContent = `${currentImageIndex + 1} / ${galleryImages.length}`;
    }

    // Handle keyboard navigation
    function handleKeyPress(e) {
      switch(e.key) {
        case 'ArrowRight':
        case ' ':
          e.preventDefault();
          nextImage();
          break;
        case 'ArrowLeft':
          e.preventDefault();
          prevImage();
          break;
        case 'Escape':
          closeLightbox();
          break;
      }
    }

    // Event listeners
    document.addEventListener('DOMContentLoaded', initGallery);

    document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
    document.getElementById('lightboxPrev').addEventListener('click', prevImage);
    document.getElementById('lightboxNext').addEventListener('click', nextImage);

    // Close on background click
    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target.id === 'lightbox') {
        closeLightbox();
      }
    });
  </script>
